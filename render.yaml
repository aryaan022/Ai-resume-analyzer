services:
  - type: web
    name: ai-resume-analyzer-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: GOOGLE_GENAI_API_KEY
        sync: false   # Set this manually in Render dashboard
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: false
